<!DOCTYPE html>
<html>
<head>
    <title>Resonance Speech</title>
    <link rel="icon" type="image/png" href="../static/Rahh.png">
    <style>
        #recordBtn {
            width: 100%;
            padding: 40px;
            font-family: 'Open Sans', ;
            font-weight: bold;
            font-size: 2em;
            background: #171717;
            color: white;
            border-color: #000000;
            border-width: 3px;
            border-radius: 15px;
        }
        .sentence-block { 
            padding: 20px;
            margin: 10px 0;
            background: #e7e7e7;
            border-radius: 10px;
            border-color: #dbdbdb;
            border-width: 1px; 
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.5em;
            cursor: pointer; 
        }

        body {
            background-color: #F9F9F9;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>

    <button id="recordBtn">Tap to Start Speaking</button>
    <div id="transcriptArea"></div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        const recordBtn = document.getElementById('recordBtn');

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // starts
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    recordBtn.innerText = 'Processing';
                    
                    // package the audio into a file
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('audio', audioBlob);

                    // backend
                    const response = await fetch('/api/transcribe', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    // makes text blocck
                    if (data.text) {
                        const newBlock = document.createElement('div');
                        newBlock.className = 'sentence-block';
                        newBlock.innerText = data.text;
                        document.getElementById('transcriptArea').appendChild(newBlock);
                    }
                    
                    recordBtn.innerText = 'Tap to Start Speaking';
                    audioChunks = []; // reset for next sentence
                };

                mediaRecorder.start();
                recordBtn.innerText = 'Tap to Stop Recording';
                recordBtn.style.background = '#1e1e1e';
                recordBtn.style.borderWidth = '5px';
                isRecording = true;

            } else {
                // stop rec
                mediaRecorder.stop();
                recordBtn.style.background = '#171717';
                isRecording = false;
            }
        });
    </script>
</body>
</html>
