<!DOCTYPE html>
<html>
<head>
    <title>Resonance Speech</title>
    <link rel="icon" type="image/png" href = "../static/Rahh.png">
    <link rel="stylesheet" href = "../static/style.css">
</head>
<body>

    <button id="recordBtn">Tap to Start Speaking</button>
    <div id="transcriptArea"></div>

    <script> 
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let targetBlock = null; //text tapped or not
        const recordBtn = document.getElementById('recordBtn');

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) { // starts, checks if its not correctly recording
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); // asks if the mic can be used
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => { // catching the audio that comes from the mic
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => { // when the user stops recording
                    recordBtn.innerText = 'Processing'; // updating the button text
                    recordBtn.classList.add('processing')
                    
                    // package the audio into a file
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('audio', audioBlob);

                    // backend
                    const response = await fetch('/api/transcribe', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    // makes text block
                    if (data.text) {
                        if (targetBlock) {
                            // OVERWRITE EXISTING TEXT
                            targetBlock.innerText = data.text;
                            targetBlock.parentElement.classList.remove('is-updating'); // Remove the red highlight
                            targetBlock = null; // Reset the target so the next recording makes a new block
                        } else {
                            // CREATE A NEW TEXT BLOCK (Your exact clean HTML from earlier)
                            const newBlock = document.createElement('div');
                            newBlock.className = 'sentence-block';
                            
                            // Notice we added onclick="reRecordText(this)" to the span!
                            newBlock.innerHTML = `
                                <span class="text-content" onclick="reRecordText(this)" title="Tap to re-record">${data.text}</span>
                                <button class="copy-btn" onclick="copyText(this)">Copy</button>
                            `;
                            
                            document.getElementById('transcriptArea').appendChild(newBlock);
                        }
                        
                        // Save to local storage after either action
                        saveTranscripts();
                    } else {
                        // If the Google API fails or hears nothing, clean up the UI anyway
                        if (targetBlock) {
                            targetBlock.parentElement.classList.remove('is-updating');
                            targetBlock = null;
                        }
                    }
                    recordBtn.innerText = 'Tap to Start Speaking';
                    recordBtn.classList.remove('processing')
                    audioChunks = []; // reset for next sentence
                };

                mediaRecorder.start();
                recordBtn.innerText = 'Tap to Stop Recording';
                recordBtn.classList.add('recording')
                isRecording = true;

            } else { // other wise if you click the button it'll stop the current recording
                mediaRecorder.stop();
                recordBtn.classList.remove('recording')
                isRecording = false;
            }
        });

        function saveTranscripts() { //so the text blocks dont go away when you reload
            const transcriptArea = document.getElementById('transcriptArea').innerHTML;
            localStorage.setItem('myTranscripts', transcriptArea); //saves it locally 
        }

        window.onload = () => { //this allows the saved block to load back up
            const savedData = localStorage.getItem('myTranscripts');
            if (savedData) {
                document.getElementById('transcriptArea').innerHTML = savedData;
            }
        };
        /// the function that does the copying
        function copyText(btnElement) {
            const textToCopy = btnElement.previousElementSibling.innerText; //finds what text to copy
            navigator.clipboard.writeText(textToCopy);
            
            //visuals
            btnElement.innerText = 'Copied!';
            btnElement.classList.add('copied-state');
            //more visuals so it looks normal after 2s
            setTimeout(() => {
                btnElement.innerText = 'Copy';
                btnElement.classList.remove('copied-state');
            }, 2000);
        }
        function reRecordText(textElement) {
            if (isRecording) return; // Prevent clicking if already recording
            
            // 1. Set the target to the specific text span you just clicked
            targetBlock = textElement;
            
            // 2. Change its background to red so you know it's selected
            targetBlock.parentElement.classList.add('is-updating');
            
            // 3. Programmatically click the main Record button to start the mic!
            document.getElementById('recordBtn').click();
        }
    </script>
</body>
</html>
